<head>

<style>
  :root {
    --indigo: #6366f1;
    --indigo-dark: #4338ca;
    --indigo-light: #a5b4fc;
    --pink: #ec4899;
    --pink-light: #f9a8d4;
    --cyan: #06b6d4;
    --cyan-light: #67e8f9;
    --amber: #f59e0b;
    --amber-light: #fcd34d;
    --bg: #070711;
    --bg2: #0d0d1f;
    --bg3: #111127;
    --surface: rgba(255,255,255,0.04);
    --surface-hover: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --text-faint: #475569;
    --scrollbar-thumb: var(--indigo);
    --grad1: linear-gradient(135deg, var(--indigo), var(--pink));
    --grad2: linear-gradient(135deg, var(--cyan), var(--indigo));
    --grad3: linear-gradient(135deg, var(--amber), var(--pink));
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth;font-size:16px;background:#070711}
  body{
    font-family:'Inter',sans-serif;
    background:transparent;
    color:var(--text);
    overflow-x:hidden;
    cursor:none;
  }

  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:var(--bg2)}
  ::-webkit-scrollbar-thumb{background:var(--indigo);border-radius:99px}
  ::-webkit-scrollbar-thumb:hover{background:var(--pink)}

  #cursor{
    position:fixed;width:12px;height:12px;
    background:var(--cyan);border-radius:50%;
    pointer-events:none;z-index:9999;
    transform:translate(-50%,-50%);
    transition:background .2s,transform .1s;
    mix-blend-mode:screen;
  }
  #cursor-ring{
    position:fixed;width:38px;height:38px;
    border:1.5px solid rgba(99,102,241,.6);
    border-radius:50%;pointer-events:none;z-index:9998;
    transform:translate(-50%,-50%);
    transition:left .12s ease-out,top .12s ease-out;
  }
  body:has(a:hover) #cursor-ring,
  body:has(button:hover) #cursor-ring{
    width:56px;height:56px;
    border-color:var(--pink);
  }

  #noise{
    position:fixed;inset:0;pointer-events:none;z-index:1;
    opacity:.035;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:200px 200px;
  }

  #particle-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

  #loading{
    position:fixed;inset:0;z-index:10000;
    background:var(--bg);
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:24px;
    transition:opacity .8s ease, visibility .8s ease;
  }
  #loading.hide{opacity:0;visibility:hidden}
  .loading-initials{
    font-family:'Space Grotesk',sans-serif;
    font-size:clamp(48px,10vw,96px);
    font-weight:800;
    background:var(--grad1);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    letter-spacing:-2px;
    animation:fadeUp .6s ease both, pulseGlow 2s ease infinite .6s;
    filter:drop-shadow(0 0 30px rgba(99,102,241,.6));
  }
  .loading-bar-wrap{
    width:220px;height:3px;
    background:rgba(255,255,255,.08);
    border-radius:99px;overflow:hidden;
  }
  .loading-bar{
    height:100%;width:0%;
    background:linear-gradient(90deg,var(--indigo),var(--pink),var(--cyan));
    border-radius:99px;
    animation:loadBar 2s ease-out forwards;
  }
  @keyframes loadBar{to{width:100%}}
  .loading-label{
    font-size:12px;letter-spacing:4px;text-transform:uppercase;
    color:var(--text-muted);font-weight:500;
  }
  @keyframes pulseGlow{
    0%,100%{filter:drop-shadow(0 0 20px rgba(99,102,241,.5))}
    50%{filter:drop-shadow(0 0 45px rgba(236,72,153,.7))}
  }

  /* ── Top Bar ── */
  nav{
    position:fixed;top:0;left:0;right:0;z-index:500;
    padding:0 clamp(16px,4vw,64px);
    height:64px;
    display:flex;align-items:center;justify-content:space-between;
    background:rgba(7,7,17,.6);
    backdrop-filter:blur(24px) saturate(200%);
    -webkit-backdrop-filter:blur(24px) saturate(200%);
    border-bottom:1px solid transparent;
    overflow:hidden;
  }
  nav::after{
    content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,var(--indigo),var(--pink),var(--cyan),transparent);
    background-size:200% 100%;
    animation:navBorderSlide 4s linear infinite;opacity:.6;
  }
  @keyframes navBorderSlide{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .nav-logo{
    font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:25px;
    background:var(--grad1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
    letter-spacing:-0.5px;
  }
  .nav-links{display:none}
  .nav-join{
    padding:9px 22px;font-size:14px;font-weight:600;
    background:var(--grad1);color:#fff;border:none;border-radius:8px;
    cursor:none;letter-spacing:.3px;text-decoration:none;
    position:relative;overflow:hidden;
    transition:transform .2s,box-shadow .2s;
    box-shadow:0 0 20px rgba(99,102,241,.3);
  }
  .nav-join::after{
    content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
    transition:left .4s ease;
  }
  .nav-join:hover{transform:scale(1.05);box-shadow:0 0 28px rgba(236,72,153,.5)}
  .nav-join:hover::after{left:100%}
  .nav-hamburger{display:none}
  /* ── Pill Nav ── */
  .pill-nav{
    display:flex;align-items:center;gap:2px;
    background:rgba(10,10,24,.7);
    backdrop-filter:blur(16px) saturate(180%);
    -webkit-backdrop-filter:blur(16px) saturate(180%);
    border:1px solid rgba(99,102,241,.22);border-radius:999px;
    padding:5px 6px;
    box-shadow:0 4px 16px rgba(0,0,0,.4),0 0 0 1px rgba(99,102,241,.08);
  }
  .pill-nav::before{
    content:'';position:absolute;inset:0;border-radius:999px;
    background:linear-gradient(90deg,transparent,rgba(99,102,241,.04),transparent);
    animation:pillScan 5s ease-in-out infinite;pointer-events:none;
  }
  @keyframes pillScan{0%{opacity:0;transform:translateX(-100%)}50%{opacity:1}100%{opacity:0;transform:translateX(100%)}}
  .pill-item{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;padding:10px 18px;border-radius:999px;text-decoration:none;
    color:var(--text-muted);font-size:11px;font-weight:600;letter-spacing:.5px;
    transition:color .25s,background .25s,box-shadow .25s,transform .2s;
    min-width:60px;position:relative;
  }
  .pill-item-icon{font-size:18px;line-height:1;transition:transform .25s}
  .pill-item:hover{color:var(--text);transform:translateY(-2px)}
  .pill-item:hover .pill-item-icon{transform:scale(1.15)}
  .pill-item.active{
    background:var(--grad1);color:#fff;
    box-shadow:0 0 20px rgba(99,102,241,.45),0 4px 16px rgba(99,102,241,.3);
  }
  .pill-item.active .pill-item-icon{transform:scale(1.1)}
  @media(max-width:600px){
    .pill-item{padding:9px 12px;min-width:48px;font-size:10px}
    .pill-item-icon{font-size:16px}
  }

  section{position:relative;z-index:10}

  #scroll-progress{
    position:fixed;top:0;left:0;z-index:9999;
    height:2px;width:0%;
    background:linear-gradient(90deg,var(--indigo),var(--pink),var(--cyan));
    transition:width .1s linear;
    box-shadow:0 0 10px rgba(99,102,241,.8),0 0 20px rgba(236,72,153,.4);
  }

  footer{
    padding:32px clamp(16px,6vw,80px);
    border-top:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
    flex-wrap:wrap;gap:16px;z-index:10;position:relative;
  }
  footer .copy{font-size:13px;color:var(--text-faint)}
  footer .foot-links{display:flex;gap:24px}
  footer .foot-links a{font-size:13px;color:var(--text-faint);text-decoration:none;transition:color .2s}
  footer .foot-links a:hover{color:var(--text)}

  @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<body>

<div id="scroll-progress"></div>
<div id="cursor"></div>
<div id="cursor-ring"></div>
<div id="noise"></div>
<canvas id="particle-canvas"></canvas>

<div id="loading">
  <div class="loading-initials">CIA</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
  <div class="loading-label">Initializing Cyber Invasion</div>
</div>

<nav id="navbar">
  <a href="index.html" class="nav-logo">CIA</a>
  <div class="pill-nav">
    <a href="index.html" class="pill-item"><span class="pill-item-icon">⌂</span><span>Home</span></a>

<script>
window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.getElementById('loading').classList.add('hide');
  },800);
});

const cursor=document.getElementById('cursor');
const ring=document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{
  mx=e.clientX;my=e.clientY;
  cursor.style.left=mx+'px';cursor.style.top=my+'px';
});
function animRing(){
  rx+=(mx-rx)*0.12;
  ry+=(my-ry)*0.12;
  ring.style.left=rx+'px';ring.style.top=ry+'px';
  requestAnimationFrame(animRing);
}animRing();

const canvas=document.getElementById('particle-canvas');
const ctx=canvas.getContext('2d');
let W,H,nodes=[],pkts=[],waves=[];

const NCOLS=[
  {r:6,g:182,b:212},{r:6,g:182,b:212},{r:6,g:182,b:212},
  {r:99,g:102,b:241},{r:99,g:102,b:241},
  {r:236,g:72,b:153},{r:245,g:158,b:11},
];
function rc(){return NCOLS[Math.floor(Math.random()*NCOLS.length)];}
function dst(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
const CONN=210;

function setup(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  nodes=[];pkts=[];waves=[];
  const n=Math.min(72,Math.floor(W*H/14000));
  for(let i=0;i<n;i++){
    const c=rc();
    nodes.push({
      x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-.5)*.2, vy:(Math.random()-.5)*.2,
      r:Math.random()*2+1.2,
      c, ph:Math.random()*Math.PI*2,
      ps:Math.random()*.022+.007,
    });
  }
}
setup();
window.addEventListener('resize',setup);

function spawnPkt(){
  if(nodes.length<2)return;
  const ai=Math.floor(Math.random()*nodes.length);
  const a=nodes[ai];
  const near=nodes.map((n,i)=>({i,d:dst(a,n)}))
    .filter(({i,d})=>i!==ai&&d<CONN)
    .sort((x,y)=>x.d-y.d);
  if(!near.length)return;
  const {i:bi}=near[Math.floor(Math.random()*Math.min(4,near.length))];
  const c=rc();
  pkts.push({ax:a.x,ay:a.y,bx:nodes[bi].x,by:nodes[bi].y,
    t:0,spd:Math.random()*.014+.004,r:c.r,g:c.g,b:c.b,ni:bi});
}

function spawnWave(){
  if(!nodes.length)return;
  const n=nodes[Math.floor(Math.random()*nodes.length)];
  waves.push({x:n.x,y:n.y,r:0,a:.5,c:n.c});
}

let pktT=0,waveT=0;

function animCanvas(){
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const d=dst(nodes[i],nodes[j]);
      if(d>CONN)continue;
      const md=Math.min(
        Math.hypot(mx-nodes[i].x,my-nodes[i].y),
        Math.hypot(mx-nodes[j].x,my-nodes[j].y)
      );
      const boost=Math.max(0,1-md/280)*.5;
      const alpha=(1-d/CONN)*.11+boost;
      const c=nodes[i].c;
      ctx.beginPath();
      ctx.moveTo(nodes[i].x,nodes[i].y);
      ctx.lineTo(nodes[j].x,nodes[j].y);
      ctx.strokeStyle=`rgba(${c.r},${c.g},${c.b},${alpha})`;
      ctx.lineWidth=.75;
      ctx.stroke();
    }
  }
  for(let i=waves.length-1;i>=0;i--){
    const w=waves[i];
    w.r+=2.5; w.a-=.008;
    if(w.a<=0){waves.splice(i,1);continue;}
    ctx.beginPath();
    ctx.arc(w.x,w.y,w.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${w.c.r},${w.c.g},${w.c.b},${w.a})`;
    ctx.lineWidth=1.2;
    ctx.stroke();
  }
  for(const n of nodes){
    n.ph+=n.ps;
    const pulse=(Math.sin(n.ph)+1)/2;
    const md=Math.hypot(mx-n.x,my-n.y);
    const mg=Math.max(0,1-md/160);
    const r=n.r+pulse*2+mg*5;
    ctx.shadowBlur=6+pulse*12+mg*24;
    ctx.shadowColor=`rgb(${n.c.r},${n.c.g},${n.c.b})`;
    ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${n.c.r},${n.c.g},${n.c.b},${.4+pulse*.5})`;
    ctx.fill();
    ctx.shadowBlur=0;
    ctx.beginPath();ctx.arc(n.x,n.y,n.r*.55,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${.55+pulse*.3})`;
    ctx.fill();
    n.x+=n.vx; n.y+=n.vy;
    if(n.x<0||n.x>W)n.vx*=-1;
    if(n.y<0||n.y>H)n.vy*=-1;
  }
  for(let i=pkts.length-1;i>=0;i--){
    const p=pkts[i];
    p.t+=p.spd;
    if(p.t>=1){pkts.splice(i,1);continue;}
    const x=p.ax+(p.bx-p.ax)*p.t;
    const y=p.ay+(p.by-p.ay)*p.t;
    for(let k=1;k<=4;k++){
      const tt=Math.max(0,p.t-k*.018);
      const tx=p.ax+(p.bx-p.ax)*tt;
      const ty=p.ay+(p.by-p.ay)*tt;
      ctx.beginPath();ctx.arc(tx,ty,1.2,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.r},${p.g},${p.b},${.18-k*.04})`;
      ctx.fill();
    }
    ctx.shadowBlur=18;
    ctx.shadowColor=`rgb(${p.r},${p.g},${p.b})`;
    ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.r},${p.g},${p.b},.95)`;
    ctx.fill();
    ctx.shadowBlur=0;
    ctx.beginPath();ctx.arc(x,y,1.2,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.9)';
    ctx.fill();
  }
  ctx.shadowBlur=0;
  pktT++; if(pktT>7){spawnPkt();pktT=0;}
  waveT++; if(waveT>95){spawnWave();waveT=0;}
  requestAnimationFrame(animCanvas);
}animCanvas();

const progressBar=document.getElementById('scroll-progress');
window.addEventListener('scroll',()=>{
  const scrolled=window.scrollY;
  const total=document.documentElement.scrollHeight-window.innerHeight;
  progressBar.style.width=(scrolled/total*100)+'%';
},{ passive:true });

const ham=document.getElementById('hamburger');
const navLinks=document.getElementById('nav-links');
if(ham){
  ham.addEventListener('click',()=>navLinks.classList.toggle('open'));
}
</script>

</body>
